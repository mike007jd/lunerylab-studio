name: desktop-release

# Build the two launch installers, then publish a single GitHub Release.
# CUDA/Vulkan-specific Windows installers are intentionally deferred until their
# release builds are stable; the launch Windows installer runs on CPU.
#
# Build / release are split on purpose:
#   - `build` (matrix) compiles + bundles each variant and stages it under a
#     STABLE, version-free asset name so the website can link straight to
#     `releases/latest/download/<asset>` without a per-release URL bump.
#   - `release` (single job, tag pushes only) collects every staged asset and
#     publishes ONE non-draft Release.
# `workflow_dispatch` builds + stages artifacts but does NOT publish a Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  # Quality gate: run the reusable hosted web and desktop lanes before
  # building any installer, so a tag push can never ship a build that fails CI.
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/validate.yml

  # On a tag push, the tag must match both package.json and tauri.conf.json so
  # the published installer's version can't drift from the release tag. On
  # workflow_dispatch (no tag) this is a no-op, keeping the build-only path alive.
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
      - name: Verify tag matches package + tauri versions
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "Not a tag push — skipping version assertion."
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./my-app/package.json').version")
          TAURI=$(node -p "require('./my-app/src-tauri/tauri.conf.json').version")
          echo "tag=$TAG package.json=$PKG tauri.conf.json=$TAURI"
          if [[ "$TAG" != "$PKG" ]]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"; exit 1
          fi
          if [[ "$TAG" != "$TAURI" ]]; then
            echo "::error::Tag $TAG does not match tauri.conf.json version $TAURI"; exit 1
          fi

  build:
    needs: [validate, version-check]
    # Least privilege: only the installer build runs here; publishing happens in
    # the `release` job. The repository wrapper owns the platform-specific bundle
    # target and the complete macOS artifact ordering.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            runner: macos-latest
            accel: metal
            label: macos-arm64
            asset: Lunery-Lab-Studio-macOS-arm64.dmg
            bundleDir: my-app/src-tauri/target/release/bundle/dmg
            bundlePattern: "*.dmg"
          - os: windows-latest
            runner: windows-latest
            accel: cpu
            label: windows-x64-cpu
            asset: Lunery-Lab-Studio-Windows-x64.exe
            bundleDir: my-app/src-tauri/target/release/bundle/nsis
            bundlePattern: "*-setup.exe"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Pinned to match scripts/desktop-bundle-assets.mjs NODE_PINNED_VERSION
          # so the runner Node and the bundled sidecar Node are the same major.
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: my-app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            my-app/src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ hashFiles('my-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-release-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install dependencies
        working-directory: my-app
        run: pnpm install --frozen-lockfile

      - name: Require signing secrets for tag releases (fail closed)
        # A tag push publishes public installers, so it must NOT ship unsigned.
        # If the platform's signing secrets are absent, fail here rather than
        # emitting an installer users have to bypass Gatekeeper/SmartScreen to
        # run. workflow_dispatch (dev, build-only) is exempt and still builds.
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          SIGNING_CREDENTIAL_OWNER: ${{ vars.SIGNING_CREDENTIAL_OWNER }}
          NOTARIZATION_CREDENTIAL_ROTATED_AT: ${{ vars.NOTARIZATION_CREDENTIAL_ROTATED_AT }}
          WINDOWS_EXPECTED_PUBLISHER: ${{ vars.WINDOWS_EXPECTED_PUBLISHER }}
        run: |
          set -euo pipefail
          missing=()
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            for name in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID SIGNING_CREDENTIAL_OWNER NOTARIZATION_CREDENTIAL_ROTATED_AT; do
              [ -n "${!name:-}" ] || missing+=("$name")
            done
          else
            for name in WINDOWS_CERTIFICATE WINDOWS_CERTIFICATE_PASSWORD SIGNING_CREDENTIAL_OWNER WINDOWS_EXPECTED_PUBLISHER; do
              [ -n "${!name:-}" ] || missing+=("$name")
            done
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Refusing to publish an unsigned ${{ matrix.label }} installer. Missing secrets: ${missing[*]}"
            exit 1
          fi
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            node <<'NODE'
          const raw = process.env.NOTARIZATION_CREDENTIAL_ROTATED_AT;
          const rotatedAt = new Date(`${raw}T00:00:00Z`);
          const ageDays = (Date.now() - rotatedAt.getTime()) / 86_400_000;
          if (!/^\d{4}-\d{2}-\d{2}$/.test(raw || "") || !Number.isFinite(ageDays) || ageDays < 0 || ageDays > 180) {
            throw new Error("NOTARIZATION_CREDENTIAL_ROTATED_AT must be a valid YYYY-MM-DD date within the last 180 days.");
          }
          NODE
          fi
          echo "Signing secrets present for ${{ matrix.label }}."

      - name: Build + bundle installer (signed + notarized when secrets present)
        working-directory: my-app
        shell: bash
        env:
          # Sidecar accelerator variant (read by fetch-llama/fetch-sd in
          # desktop:prepare). macOS arm64 ignores it (Metal-only).
          LUNERY_ACCEL: ${{ matrix.accel }}
          # Authenticated GitHub API lookups avoid public release rate limits
          # while resolving pinned sidecar assets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple Developer ID signing + notarization (macOS only; ignored elsewhere).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm desktop:build

      - name: Verify macOS signature + notarization
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          dmg=$(find "${{ matrix.bundleDir }}" -maxdepth 1 -type f -name '${{ matrix.bundlePattern }}' -print -quit)
          app=$(find my-app/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          [ -n "$app" ] || { echo "::error::No macOS app bundle found."; exit 1; }
          echo "Verifying $app and $dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -F "Authority=$APPLE_SIGNING_IDENTITY"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$app"
          codesign --verify --verbose=2 "$dmg"
          spctl --assess --type open --context context:primary-signature -v "$dmg"
          xcrun stapler validate "$dmg"
          hdiutil verify "$dmg"

      - name: Sign Windows installer (Authenticode) + verify
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_EXPECTED_PUBLISHER: ${{ vars.WINDOWS_EXPECTED_PUBLISHER }}
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Get-ChildItem -Path "my-app/src-tauri/target/release/bundle/nsis" -Filter *-setup.exe |
            Select-Object -First 1
          if (-not $exe) { throw "No NSIS installer found to sign." }

          # Decode the base64 PFX secret to a temp file.
          $pfx = Join-Path $env:RUNNER_TEMP "code-sign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))

          # Resolve signtool.exe from the installed Windows SDK.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found in the Windows SDK." }

          try {
            & $signtool.FullName sign `
              /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              $exe.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          } finally {
            if (Test-Path $pfx) { Remove-Item $pfx -Force }
          }

          $sig = Get-AuthenticodeSignature $exe.FullName
          if ($sig.Status -ne 'Valid') { throw "Authenticode signature not Valid: $($sig.Status)" }
          if (-not $sig.TimeStamperCertificate) { throw "Authenticode signature has no RFC-3161 timestamp certificate." }
          $publisher = $sig.SignerCertificate.Subject
          if ($publisher -notlike "*$env:WINDOWS_EXPECTED_PUBLISHER*") {
            throw "Unexpected Authenticode publisher: $publisher"
          }
          & $signtool.FullName verify /pa /all /v $exe.FullName
          if ($LASTEXITCODE -ne 0) { throw "signtool verification failed with exit code $LASTEXITCODE" }
          Write-Host "Signed $($exe.Name); publisher=$publisher; timestamp=$($sig.TimeStamperCertificate.Subject)"

      - name: Stage installer under a stable asset name
        # bash runs on both macOS and Windows runners (Git Bash); one script
        # for the whole matrix. Tauri's default filename carries the version +
        # arch, which we flatten to a fixed name per variant.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          src=$(find "${{ matrix.bundleDir }}" -maxdepth 1 -type f -name '${{ matrix.bundlePattern }}' -print -quit)
          if [ -z "$src" ]; then
            echo "No installer found for ${{ matrix.label }} in ${{ matrix.bundleDir }}" >&2
            exit 1
          fi
          cp "$src" "dist/${{ matrix.asset }}"
          echo "Staged $src -> dist/${{ matrix.asset }}"

      - name: Upload staged installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installer-${{ matrix.label }}
          if-no-files-found: error
          path: dist/${{ matrix.asset }}

  release:
    # Publish exactly one Release per tag, after every variant has built.
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Collect every staged installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: installer-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          # Public installers live in a clean releases-only repository so the
          # website can depend on one stable download contract.
          GH_TOKEN: ${{ secrets.LUNERY_RELEASES_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: mike007jd/LuneryLab-Releases
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing LUNERY_RELEASES_TOKEN for $REPO release publishing."
            exit 1
          fi
          # Publish SHA-256 checksums alongside the installers so downloads can be
          # verified against the release.
          ( cd dist && sha256sum -- * > SHA256SUMS.txt )
          cat > notes.md <<'EOF'
          ## Install

          - **macOS (Apple Silicon)** — download the `.dmg`, open it, and drag Lunery Lab Studio to Applications, then launch it normally. The build is signed with an Apple Developer ID and notarized.
          - **Windows (x64)** — download the `.exe` installer and run it. The installer is Authenticode-signed. The launch Windows installer runs on CPU and works everywhere.

          Verify your download against `SHA256SUMS.txt`.

          Local-first and account-less: bring your own local models or provider keys.
          EOF
          # Idempotent: re-running the same tag re-uploads assets instead of failing.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$REPO" --clobber dist/*
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "Lunery Lab Studio $TAG" \
              --notes-file notes.md \
              --generate-notes \
              dist/*
          fi
